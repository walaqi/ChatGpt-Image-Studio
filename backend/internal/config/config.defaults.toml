# 默认配置（会被后端加载）。如需自定义配置：复制本文件为 `config.toml` 并修改。

[app]
name = "chatgpt2api-studio"
version = "1.2.10"
api_key = ""
auth_key = "chatgpt2api"
image_format = "url"
max_upload_size_mb = 50

[server]
host = "0.0.0.0"
port = 7000
static_dir = "static"
# 对外子路径前缀（同源反代嵌入时设为 "/image-studio"）。
# 用于在兼容 /v1/images/* 响应里生成浏览器可见的图片 URL。
# 留空表示本地直连开发，不加前缀。
public_base_path = ""
# 允许携带凭证（cookie）的跨域来源白名单。生产为同源反代，跨域不触发，可留空。
# 仅开发期需要：Vite dev server（localhost:5173）与后端（localhost:7000）不同源。
allowed_origins = ["http://localhost:5173", "http://127.0.0.1:5173"]
max_image_concurrency = 8
image_queue_limit = 32
image_queue_timeout_seconds = 20
image_task_queue_ttl_seconds = 600

[chatgpt]
model = "gpt-image-2"
sse_timeout = 600
poll_interval = 3
poll_max_wait = 600
request_timeout = 120
# 后端自 phase 7 起仅支持 cpa 单一模式；旧 studio/mix 值会归一化为 cpa。
image_mode = "cpa"

[storage]
backend = "current"
config_backend = "file"
image_dir = "data/tmp/image"
image_storage = "browser"
image_conversation_storage = "browser"
image_data_storage = "browser"
sqlite_path = "data/chatgpt-image-studio.db"
redis_addr = "127.0.0.1:6379"
redis_password = ""
redis_db = 0
redis_prefix = "chatgpt2api:studio"

# CPA 图片接口配置。多租户部署下 base_url / api_key 由凭证 resolver 按用户注入；
# 这里的值仅作为单机/兜底配置。
[cpa]
base_url = ""
api_key = ""
request_timeout = 60                  # 秒；出图整条请求（含读完响应体）的超时上限
route_strategy = "codex_responses"    # images_api=/v1/images/generations（单轮）；codex_responses=/v1/responses（原生 SSE，支持多轮上下文）；auto=先 images_api 失败回退 responses
responses_context_max_turns = 5       # 多轮上下文最多回放的历史轮数（0 关闭，按时间顺序拼）；仅 codex_responses/auto 路由生效
responses_context_max_bytes = 8388608 # 重建 input 数组的近似字节预算（含内联图，默认 8 MiB）；超限从最早轮次砍起

# 多租户身份：母系统签发的一次性 RS256 入口票据 + image-studio 自有会话。
# 仅在嵌入母系统的多租户部署下需要配置；单机模式可留空。
[identity]
jwt_public_key_path = ""          # 母系统 RS256 公钥 PEM 路径
jwt_issuer = "sub2api"            # 入口票据 iss，需与母系统对齐
jwt_audience = "image-studio"     # 入口票据 aud，需与母系统对齐
session_secret = ""               # image-studio 自有会话签名密钥（与母系统公钥无关）
session_ttl_seconds = 3600

# 多租户凭证：两段式回调母系统内部端点，按 userID + key_id 取用户渠道 key。
[credential]
endpoint_base = ""                # 母系统内网基址，如 http://main-system-internal:8080
internal_secret = ""              # service-to-service 鉴权 X-Internal-Secret
cache_ttl_seconds = 60
gateway_base_url = ""             # 用户 key 调用的网关地址，区分环境
request_timeout = 20

[log]
log_all_requests = false
